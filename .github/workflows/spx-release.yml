name: SPX Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME}"
          NOTES=$(awk "/^## \[?${VERSION//v}\]?/{found=1; next} /^## /{if(found) exit} found{print}" CHANGELOG.md)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          name: "SpxOpenCode ${{ github.ref_name }}"
          body: ${{ steps.changelog.outputs.notes }}
          draft: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'preview') }}

  binaries:
    name: Build & Upload Binaries
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build multi-platform binaries
        working-directory: packages/cli
        run: bun run script/build.ts

      - name: Upload binaries to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release upload "$TAG" \
            "packages/cli/dist/cli-linux-x64/bin/lildax#spx-linux-x64" \
            "packages/cli/dist/cli-darwin-arm64/bin/lildax#spx-darwin-arm64" \
            "packages/cli/dist/cli-darwin-x64/bin/lildax#spx-darwin-x64" \
            "packages/cli/dist/cli-windows-x64/bin/lildax.exe#spx-windows-x64.exe" \
            --clobber
