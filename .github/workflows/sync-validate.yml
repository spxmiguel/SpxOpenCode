name: Upstream Sync Validation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC

jobs:
  validate:
    name: Validate upstream merge compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install

      - name: Add upstream remote
        run: git remote add upstream https://github.com/anomalyco/opencode.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Check how far behind
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "Commits behind upstream: $BEHIND"
          echo "COMMITS_BEHIND=$BEHIND" >> "$GITHUB_ENV"

      - name: List upstream changes
        run: |
          echo "=== Files changed in upstream since our fork point ==="
          git diff --name-only HEAD...upstream/main || true

      - name: Attempt dry-run merge
        id: merge
        run: |
          git config user.email "ci@spxopencode"
          git config user.name "SPX CI"
          if git merge --no-commit --no-ff upstream/main 2>&1; then
            echo "MERGE_STATUS=clean" >> "$GITHUB_ENV"
            echo "Merge would be clean."
          else
            echo "MERGE_STATUS=conflict" >> "$GITHUB_ENV"
            echo "=== Conflict files ==="
            git diff --name-only --diff-filter=U || true
          fi

      - name: Abort merge (always)
        if: always()
        run: git merge --abort 2>/dev/null || git reset --hard HEAD

      - name: Typecheck
        run: |
          cd packages/tui
          bun run typecheck

      - name: Test SPX plugins
        run: |
          cd packages/tui
          bun test

      - name: Summary
        if: always()
        run: |
          echo "## Upstream Sync Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commits behind upstream**: $COMMITS_BEHIND" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Merge status**: $MERGE_STATUS" >> "$GITHUB_STEP_SUMMARY"
          if [ "$MERGE_STATUS" = "conflict" ]; then
            echo "- **Action needed**: run \`./scripts/upstream-sync.sh\` and resolve conflicts manually" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- **Action**: merge can be applied cleanly when ready" >> "$GITHUB_STEP_SUMMARY"
          fi
