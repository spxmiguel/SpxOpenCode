name: SPX CI

on:
  pull_request:
    branches: [main]
    paths:
      - "packages/tui/src/feature-plugins/spx/**"
      - "packages/tui/src/feature-plugins/builtins.ts"
      - "packages/tui/src/keybind.ts"

jobs:
  typecheck:
    name: Typecheck SPX plugins
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        working-directory: packages/tui
        run: bun run typecheck

  lint:
    name: Lint SPX plugins
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        working-directory: packages/tui
        run: bun run lint --filter='packages/tui/src/feature-plugins/spx/**'
        continue-on-error: true
