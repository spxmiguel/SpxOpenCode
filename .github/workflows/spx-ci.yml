name: SPX CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "packages/tui/src/feature-plugins/spx/**"
      - "packages/tui/src/feature-plugins/builtins.ts"
      - "packages/tui/src/config/keybind.ts"
      - "spx/skills/**"
      - "scripts/**"
  push:
    branches: [main]
    paths:
      - "packages/tui/src/feature-plugins/spx/**"
      - "packages/tui/src/feature-plugins/builtins.ts"
      - "packages/tui/src/config/keybind.ts"
      - "spx/skills/**"
      - "scripts/**"

jobs:
  typecheck:
    name: Typecheck SPX plugins
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        working-directory: packages/tui
        run: bun run typecheck

  lint:
    name: Lint SPX plugins
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install

      - name: Lint
        working-directory: packages/tui
        run: bun run lint --filter='packages/tui/src/feature-plugins/spx/**'
        continue-on-error: true

  test:
    name: Test SPX plugins (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install

      - name: Test
        working-directory: packages/tui
        run: bun test

  validate-installer:
    name: Validate installer scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - name: shellcheck (install.sh)
        run: shellcheck scripts/install.sh

      - name: PowerShell syntax check (install.ps1)
        shell: pwsh
        run: |
          $errors = $null
          $null = [System.Management.Automation.Language.Parser]::ParseFile(
            "${{ github.workspace }}/scripts/install.ps1",
            [ref]$null,
            [ref]$errors
          )
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }

      - name: URL consistency check
        run: |
          REPO_URL="https://github.com/spxmiguel/SpxOpenCode"
          for file in scripts/install.sh scripts/install.ps1 README.md; do
            if grep -q "spxmiguel/SpxOpenCode" "$file"; then
              echo "OK: $file references correct repo"
            else
              echo "FAIL: $file missing repo URL reference"
              exit 1
            fi
          done

      - name: install.sh references correct entry point
        run: grep -q "packages/opencode/src/index.ts" scripts/install.sh

      - name: install.ps1 references correct entry point
        run: grep -q "packages/opencode/src/index.ts" scripts/install.ps1
